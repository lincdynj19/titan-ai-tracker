<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FUEL AI // TITAN V4.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@300;700&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --surface: rgba(15, 15, 15, 0.9);
            --accent: #c8f542;
            --accent-glow: rgba(200, 245, 66, 0.4);
            --blue: #00f2ff;
            --text: #ffffff;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; min-height: 100vh; }

        .bg-lines { position: fixed; inset: 0; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); z-index: -1; }
        .bg-lines::after { 
            content: ""; position: absolute; inset: 0; 
            background-image: linear-gradient(var(--glass-border) 1px, transparent 1px), linear-gradient(90deg, var(--glass-border) 1px, transparent 1px);
            background-size: 50px 50px; mask-image: radial-gradient(ellipse at center, black, transparent 90%); opacity: 0.2;
        }

        .container { max-width: 480px; margin: 0 auto; padding: 25px; }

        h1 { font-family: 'Bebas Neue'; font-size: 80px; color: var(--accent); line-height: 0.8; letter-spacing: -2px; margin-bottom: 10px; text-shadow: 0 0 25px var(--accent-glow); }
        .sub-header { font-family: 'JetBrains Mono'; font-size: 10px; color: var(--accent); letter-spacing: 5px; margin-bottom: 25px; opacity: 0.7; }

        .titan-card { 
            background: var(--surface); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); 
            border-radius: 35px; padding: 25px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        
        label { font-family: 'Bebas Neue'; font-size: 18px; color: #666; display: block; margin-bottom: 8px; }
        input, select {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #333; padding: 18px; border-radius: 15px; 
            color: var(--accent); font-family: 'JetBrains Mono'; font-size: 16px; margin-bottom: 15px; outline: none;
        }

        .btn-titan { 
            width: 100%; padding: 25px; border-radius: 20px; border: none; font-family: 'Bebas Neue'; 
            font-size: 30px; cursor: pointer; transition: 0.3s; text-transform: uppercase; 
        }
        .btn-main { background: var(--accent); color: #000; box-shadow: 0 10px 35px var(--accent-glow); font-weight: bold; }
        .btn-main:active { transform: scale(0.96); }

        .big-val { font-family: 'Bebas Neue'; font-size: 100px; line-height: 0.85; margin: 10px 0; }
        .stat-box { 
            background: var(--surface); padding: 20px; border-radius: 28px; border: 1px solid var(--glass-border); 
            position: relative; overflow: hidden;
        }
        .stat-box::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent); }
        .stat-box.water::after { background: var(--blue); }

        #loading { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 999; 
            display: none; align-items: center; justify-content: center; flex-direction: column; 
        }
        .scanner-line {
            width: 100%; height: 3px; background: var(--accent); position: absolute; 
            box-shadow: 0 0 20px var(--accent); animation: scanLoop 2s infinite ease-in-out;
        }
        @keyframes scanLoop { 0% { top: 0%; } 100% { top: 100%; } }

        .page { display: none; }
        .page.active { display: flex; flex-direction: column; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .supp-btn { 
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #222; padding: 12px; 
            border-radius: 12px; font-family: 'Bebas Neue'; font-size: 14px; color: #555; cursor: pointer;
        }
        .supp-btn.active { color: #000; background: var(--accent); }
    </style>
</head>
<body>

<div class="bg-lines"></div>

<div id="loading">
    <div class="scanner-line"></div>
    <h1 style="font-size: 35px;">BIO-SCANNING</h1>
</div>

<div class="container">
    <div id="setupPage" class="page active">
        <div class="sub-header">SYSTEM_INIT // V4.1</div>
        <h1>TITAN<br>PROTOCOL</h1>
        <div class="titan-card">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>LBS</label><input type="number" id="weight" value="180"></div>
                <div><label>AGE</label><input type="number" id="age" value="25"></div>
            </div>
            <label>HEIGHT (FT/IN)</label>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <input type="number" id="ft" value="5">
                <input type="number" id="in" value="10">
            </div>
            <label>ACTIVITY</label>
            <select id="activity">
                <option value="1.2">SEDENTARY</option>
                <option value="1.55">ACTIVE</option>
                <option value="1.9">ELITE</option>
            </select>
        </div>
        <button class="btn-titan btn-main" onclick="initTitan()">ACTIVATE →</button>
    </div>

    <div id="dashPage" class="page">
        <div class="sub-header">LIVE_FEED // TELEMETRY</div>
        <div style="text-align: center; margin: 20px 0;">
            <label>DAILY CALORIES</label>
            <div class="big-val"><span id="currCal">0</span><span style="color: #222; font-size: 30px;">/<span id="goalCal">---</span></span></div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
            <div class="stat-box">
                <label style="font-size: 14px; color: var(--accent);">PROTEIN</label>
                <div class="big-val" style="font-size: 45px; margin: 0;"><span id="currP">0</span>g</div>
            </div>
            <div class="stat-box water">
                <label style="font-size: 14px; color: var(--blue);">WATER</label>
                <div class="big-val" style="font-size: 45px; margin: 0;"><span id="currW">0</span>oz</div>
            </div>
        </div>
        <div class="titan-card" style="padding: 15px;">
            <div style="display: flex; gap: 10px;">
                <button id="btn-whey" class="supp-btn" onclick="logSupp('whey', 25)">WHEY</button>
                <button id="btn-crea" class="supp-btn" onclick="logSupp('crea', 5)">CREATINE</button>
                <button class="supp-btn" style="color: var(--blue);" onclick="addWater(16)">+16OZ</button>
            </div>
        </div>
        <button class="btn-titan btn-main" onclick="triggerScan()">📸 SCAN BIO-MATTER</button>
        <div id="log" style="margin-top: 20px; font-family: 'JetBrains Mono'; font-size: 10px; color: #444;"></div>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyAqSSuwb3TGdKMeDOZhVF3jrXqYA0eAbcs"; 
    let stats = { cal: 0, p: 0, water: 0, goal: 2000, stack: { whey: false, crea: false } };

    function initTitan() {
        const w = parseFloat(document.getElementById('weight').value);
        const f = parseFloat(document.getElementById('ft').value);
        const i = parseFloat(document.getElementById('in').value);
        const a = parseFloat(document.getElementById('age').value);
        const activity = parseFloat(document.getElementById('activity').value);
        const bmr = (10 * (w * 0.453)) + (6.25 * (((f*12)+i)*2.54)) - (5 * a) + 5;
        stats.goal = Math.round(bmr * activity);
        document.getElementById('goalCal').innerText = stats.goal;
        document.getElementById('setupPage').classList.remove('active');
        document.getElementById('dashPage').classList.add('active');
    }

    function addWater(amt) { stats.water += amt; updateUI(); }
    function logSupp(type, protein) {
        if (!stats.stack[type]) {
            stats.p += protein; stats.cal += (protein * 4);
            stats.stack[type] = true;
            document.getElementById(`btn-${type}`).classList.add('active');
            updateUI();
        }
    }
    function updateUI() {
        document.getElementById('currCal').innerText = Math.round(stats.cal);
        document.getElementById('currP').innerText = Math.round(stats.p);
        document.getElementById('currW').innerText = stats.water;
    }

    function triggerScan() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => analyze(e.target.files[0]);
        input.click();
    }

    async function analyze(file) {
        if (!file) return;
        document.getElementById('loading').style.display = 'flex';
        const reader = new FileReader();
        reader.onloadend = async () => {
            const base64 = reader.result.split(',')[1];
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{ parts: [
                            {text: "Estimate food. Return ONLY JSON: {\"name\":\"str\",\"cal\":num,\"p\":num}"},
                            {inline_data: {mime_type: "image/jpeg", data: base64}}
                        ]}]
                    })
                });
                const data = await response.json();
                const rawText = data.candidates[0].content.parts[0].text;
                // Forces the code to find JSON even if the AI adds text
                const cleanJson = JSON.parse(rawText.match(/\{.*\}/s)[0]);
                stats.cal += cleanJson.cal; stats.p += cleanJson.p;
                updateUI();
                document.getElementById('log').innerHTML = `> DETECTED: ${cleanJson.name.toUpperCase()} (+${cleanJson.cal}kcal)<br>` + document.getElementById('log').innerHTML;
            } catch (err) {
                alert("SENSOR_FAULT: Check API Key or Connection.");
                console.error(err);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };
        reader.readAsDataURL(file);
    }
</script>
</body>
</html>
